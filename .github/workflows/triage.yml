name: triage

on:
  # Polls every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC).
  schedule:
    - cron: "0 */4 * * *"
  # Manual "Run workflow" button — use this to trigger an immediate run
  # (e.g. for a demo) without waiting for the next 4-hour tick.
  workflow_dispatch:

concurrency:
  group: triage-poll
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      LLM_PROVIDER: GEMINI
      # Digest fires on the first poll at/after this UTC hour, once per day.
      # Must be <= 20 (the last 4-hour tick). 14 → digest on the 16:00 run.
      DIGEST_HOUR: "14"
      DB_PATH: triage.db
      GMAIL_CREDENTIALS_PATH: credentials.json
      GMAIL_TOKEN_PATH: token.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Gmail token from secret
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: |
          if [ -z "$GMAIL_TOKEN" ]; then
            echo "::error::GMAIL_TOKEN secret is empty. Run scripts/encode_token.py locally and add it."
            exit 1
          fi
          echo "$GMAIL_TOKEN" | base64 -d > token.json
          test -s token.json || { echo "::error::Decoded token.json is empty"; exit 1; }

      - name: Run one-shot poll
        run: python -m pipeline.poll_once

      - name: Commit state back to repo
        run: |
          git config user.name  "triage-bot"
          git config user.email "triage-bot@users.noreply.github.com"
          # Force-add state files (triage.db is in .gitignore by design).
          # Stage each file independently: a single `git add` with a missing
          # pathspec aborts and stages nothing. .digest_marker only exists
          # after a digest has fired. Never add token.json / credentials.json.
          for f in triage.db .digest_marker; do
            [ -f "$f" ] && git add -f "$f"
          done
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(triage): update state [skip ci]"
            git push
          fi

      - name: Clean up token
        if: always()
        run: rm -f token.json
